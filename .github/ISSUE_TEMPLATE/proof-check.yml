name: Proof check
description: Identify a specific mathematical implication that needs verification.
title: "[proof] "
labels: [proof-check]
body:
  - type: input
    id: paper
    attributes:
      label: Paper and version
      placeholder: k-block-index-bijection v0.2.0
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Exact location
      placeholder: Lemma 3.3, second paragraph, or equation (3.7)
    validations:
      required: true
  - type: textarea
    id: claim
    attributes:
      label: Claim being checked
      description: State the implication in your own words.
    validations:
      required: true
  - type: textarea
    id: reasoning
    attributes:
      label: Reasoning or gap
      description: Give a proof, a missing condition, or a precise reason the step fails.
    validations:
      required: true
  - type: textarea
    id: suggested_fix
    attributes:
      label: Suggested repair (optional)
